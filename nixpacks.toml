[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/playwright install chromium --with-deps || true"
]

[start]
cmd = "python -c "import os; s=os.getenv('RAILWAY_SERVICE_NAME','web'); exec(open('tools/run_mcp_remote.py' if s=='mcp' else 'tools/run_api_server.py').read())""
