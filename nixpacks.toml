[phases.setup]
nixPkgs = ["python311", "chromium", "nss", "at-spi2-atk", "cups", "libdrm", "mesa", "libxkbcommon", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "libgbm"]

[phases.install]
cmds = [
  "pip install -r requirements.txt",
  "playwright install chromium --with-deps || true"
]

[start]
cmd = "python tools/run_api_server.py"
