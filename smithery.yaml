startCommand:
  type: http
  command: python
  args: ["tools/run_mcp_remote.py"]
  env:
    LMD_WEBSITE_API_KEY: "${config.lmd_api_key}"
    BOOKING_API_URL: "${config.booking_api_url}"

configSchema:
  type: object
  properties:
    lmd_api_key:
      type: string
      description: "API key for making bookings. Get yours free at https://web-production-dc74b.up.railway.app/api/keys/register (POST, no body needed)."
    booking_api_url:
      type: string
      description: "Booking API base URL. Leave blank to use the default production server."
      default: "https://web-production-dc74b.up.railway.app"
  required: []
  additionalProperties: false

exampleConfig:
  lmd_api_key: "lmd_..."
  booking_api_url: "https://web-production-dc74b.up.railway.app"

name: Last Minute Deals HQ
description: >
  Real-time last-minute tour and activity inventory sourced live from production
  booking systems via the OCTO open standard. 16 active suppliers across Iceland,
  Italy, Morocco, Portugal, Japan, Tanzania, Finland, Montenegro, Romania, Egypt,
  Turkey, United States, United Kingdom, and China. Search available slots and
  create Stripe checkout sessions — customers pay on our page, suppliers are
  confirmed automatically. Inventory refreshed every 4 hours. To enable bookings,
  register a free API key at the booking server.

tools:
  - name: search_slots
    description: >
      Search for last-minute available tours and activities. Returns live inventory
      sorted by urgency (soonest first). Filter by city (partial match), category,
      hours_ahead window, and max_price. Categories: experiences, wellness, beauty,
      hospitality, home_services, professional_services.

  - name: book_slot
    description: >
      Book a last-minute slot for a customer. Two modes:
      "approval" (default) — returns a Stripe checkout_url for the customer to pay;
      "autonomous" — charges a pre-funded wallet immediately and returns a
      confirmation number directly (requires wallet_id). Supports quantity (per-person pricing).

  - name: get_booking_status
    description: >
      Check the status of a booking by booking_id. Returns status, confirmation_number,
      checkout_url (recoverable if lost), service details, and payment_status.
      Status values: pending_payment (awaiting checkout), fulfilling (paid, confirming
      with supplier), booked (confirmed — confirmation_number set), failed, cancelled.

  - name: get_supplier_info
    description: >
      Returns the full supplier network — destinations, experience types, booking platform,
      and confirmation speed. Use this before search_slots to understand what inventory
      is available and which cities/countries to filter on.

