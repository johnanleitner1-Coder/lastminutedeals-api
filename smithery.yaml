startCommand:
  type: http
  command: python
  args: ["tools/run_mcp_remote.py"]
  env:
    LMD_WEBSITE_API_KEY: "${config.lmd_api_key}"
    BOOKING_API_URL: "${config.booking_api_url}"

configSchema:
  type: object
  properties:
    lmd_api_key:
      type: string
      description: "API key for making bookings. Get yours free at https://api.lastminutedealshq.com/api/keys/register (POST, no body needed)."
    booking_api_url:
      type: string
      description: "Booking API base URL. Leave blank to use the default production server."
      default: "https://api.lastminutedealshq.com"
  required: []
  additionalProperties: false

exampleConfig:
  lmd_api_key: "lmd_..."
  booking_api_url: "https://api.lastminutedealshq.com"

name: Last Minute Deals HQ
description: >
  Live bookable slots across 32 suppliers in 47 countries across Europe, Asia, Africa, and the Americas. Sourced from
  production booking systems via the OCTO open standard. Covers tours, activities,
  photo shoots, and multi-day trips in 100+ cities including Paris, London, Rome,
  Berlin, Amsterdam, Cairo, Reykjavik, Kyoto, and more. Search available slots, create Stripe
  checkout sessions, or book autonomously with a pre-funded wallet. Inventory
  refreshed every 4 hours. To enable bookings, register a free API key at the
  booking server.

tools:
  - name: search_slots
    description: >
      Search for last-minute available tours and activities. Returns live inventory
      sorted by urgency (soonest first). Filter by city (partial match), category,
      hours_ahead window, and max_price. Categories: experiences, wellness, beauty,
      hospitality, home_services, professional_services.

  - name: book_slot
    description: >
      Book a last-minute slot for a customer. Two modes:
      "approval" (default) — returns a Stripe checkout_url for the customer to pay;
      "autonomous" — charges a pre-funded wallet immediately and returns a
      confirmation number directly (requires wallet_id). Supports quantity (per-person pricing).

  - name: get_booking_status
    description: >
      Check the status of a booking by booking_id. Returns status, confirmation_number,
      checkout_url (recoverable if lost), service details, and payment_status.
      Status values: pending_payment (awaiting checkout), fulfilling (paid, confirming
      with supplier), booked (confirmed — confirmation_number set), failed, cancelled.

  - name: preview_slot
    description: >
      Get a shareable booking page URL for a slot. Returns a link the user can click
      to see details and complete the booking themselves — they enter their own name,
      email, and phone on the page and pay via Stripe. Use this instead of book_slot
      when the user is a human browsing with an AI assistant.

  - name: get_supplier_info
    description: >
      Returns the full supplier network — destinations, experience types, booking platform,
      and confirmation speed. Use this before search_slots to understand what inventory
      is available and which cities/countries to filter on.

